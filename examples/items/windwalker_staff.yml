# ============================================================
#  Windwalker Staff  —  utility movement wand
# ============================================================
# SHOWS OFF:
#   * A movement ability behind a full GATE stack, all at once:
#       - charge-cost: 1        (spends a stored charge)
#       - cost: xp-levels: 1    (spends 1 XP level per use)
#       - cooldown-group        (2s shared lockout)
#   * An IF/ELSE inside the ability: sneak to BLINK through blocks,
#     otherwise LEAP forward — one button, two moves.
#   * A recharge ability paid with FEATHERs (item cost).
#   * TWO recipes for the same item: a shaped craft AND a stonecutter cut
#     from a Breeze Rod.
#
# Get it once loaded with:  /itemsmith get windwalker_staff
# ============================================================

material: BLAZE_ROD
name: "<gradient:#80d8ff:#ffffff><bold>Windwalker Staff</bold></gradient>"
lore:
  - "<gray>Bottled gale in a rod of ash.</gray>"
  - "<gray>Right-click: <aqua>Windstep</aqua> — leap forward</gray>"
  - "<gray>Sneak + right-click: <aqua>Blink</aqua> through walls</gray>"
  - "<dark_gray>Costs 1 charge + 1 XP level per step.</dark_gray>"
  - "<gray>Sneak-hit air with <white>Feathers</white> in hand-slot to recharge.</gray>"

charges: 16
max-charges: 16
on-depletion: keep_inert
durability-bar: true

abilities:
  # --- Windstep / Blink ---------------------------------------------------
  - activator: right_click
    targeter: self
    charge-cost: 1
    cost:
      xp-levels: 1
    cooldown-group:
      key: windwalker_step
      seconds: 2
    deny-message: "<aqua>Not enough wind — need 1 charge and 1 XP level.</aqua>"
    actions:
      - type: if
        conditions:
          - type: is_sneaking
        then:
          - type: blink
            distance: 7
          - type: send_actionbar
            text: "<aqua>Blink</aqua>"
        else:
          - type: leap
            power: 1.7
          - type: send_actionbar
            text: "<aqua>Windstep</aqua>"
      - type: particle_helix
        particle: cloud
        radius: 0.6
        height: 2.0
        points: 30
        turns: 2
      - type: play_sound
        sound: entity.breeze.shoot
        volume: 0.9
        pitch: 1.3

  # --- Recharge with feathers --------------------------------------------
  - activator: sneak_left_click
    targeter: self
    cost:
      items:
        - material: FEATHER
          amount: 2
    deny-message: "<gray>Hold 2 Feathers to recharge the staff.</gray>"
    actions:
      - type: add_charges
        amount: 8
      - type: particle
        particle: cloud
        count: 20
        spread: 0.5
      - type: play_sound
        sound: entity.player.levelup
        volume: 0.6
        pitch: 1.6
      - type: send_actionbar
        text: "<aqua>The staff drinks the breeze.</aqua>"

recipes:
  - type: shaped
    shape:
      - " P "
      - "PBP"
      - " F "
    ingredients:
      P: PHANTOM_MEMBRANE
      B: BLAZE_ROD
      F: FEATHER
  - type: stonecutting
    input: BREEZE_ROD
